services:
  postgres:
    image: postgres:17
    container_name: uyjoy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: uyjoy_olx
      POSTGRES_USER: uyjoy
      POSTGRES_PASSWORD: uyjoy_password
    ports:
      - "55432:5432"
    volumes:
      - uyjoy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uyjoy -d uyjoy_olx"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: uyjoy-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@uyjoy.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  uyjoy_postgres_data:
